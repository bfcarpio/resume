name: Resume Pipeline

on:
  push:
    paths:
      - resume.json

jobs:
  validate:
    name: Validate resume.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate resume.json
        run: bash scripts/validate.sh

      - name: Update Resume Gist
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: bash scripts/update-gist.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Generate RenderCV YAML
        run: bash scripts/generate-rendercv.sh

      - name: Upload RenderCV YAML
        uses: actions/upload-artifact@v4
        with:
          name: rendercv-yaml
          path: rendercv.yaml
          if-no-files-found: error
          retention-days: 7

      - name: Create Release Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          zip -j resume-package-${{ github.ref_name }}.zip resume.json rendercv.yaml

      - name: Upload Release Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: resume-package-${{ github.ref_name }}
          path: resume-package-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 180
