name: Resume Pipeline

on:
  push:
    paths:
      - resume.json

jobs:
  validate:
    name: Validate resume.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate resume.json
        run: bash scripts/validate.sh

  update-gist:
    name: Update Resume Gist
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Update Resume Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-gist.sh

  build-jsonresume-pdfs:
    if: false
    name: Build JSON Resume PDFs
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install themes
        run: npm install jsonresume-theme-flat jsonresume-theme-developer-mono

      - name: Build PDFs
        run: |
          for theme in flat developer-mono; do
            bash scripts/build-jsonresume-pdf.sh resume.json "resume-${theme}.pdf" "${theme}"
            echo "Uploading resume-pdf-${theme}"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: resume-*.pdf
          if-no-files-found: error
          retention-days: 7

  build-rendercv-pdfs:
    name: Build RenderCV PDFs
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build PDFs
        run: |
          for theme in engineeringclassic harvard; do
            bash scripts/build-rendercv.sh resume.json "resume-${theme}.pdf" "${theme}"
            echo "Uploading rendercv-pdf-${theme}"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: rendercv-pdfs
          path: resume-*.pdf
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release Package
    runs-on: ubuntu-latest
    needs:
      - build-jsonresume-pdfs
      - build-rendercv-pdfs
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download JSON Resume PDFs
        uses: actions/download-artifact@v4
        with:
          name: resume-pdfs

      - name: Download RenderCV PDFs
        uses: actions/download-artifact@v4
        with:
          name: rendercv-pdfs

      - name: Generate RenderCV YAML
        run: uvx --from jsonresume-to-rendercv jsonresume_to_rendercv resume.json rendercv.yaml

      - name: Package Release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          uvx --from yq yq -i ".build_version = \"${VERSION}\"" resume.json
          zip -j resume-package-${VERSION}.zip resume.json rendercv.yaml resume-*.pdf

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-package-${{ github.ref_name }}
          path: resume-package-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 180
